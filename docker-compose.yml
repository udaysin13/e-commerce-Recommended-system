version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fluxcart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fluxcart
      POSTGRES_PASSWORD: fluxcart
      POSTGRES_DB: fluxcart
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: fluxcart_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  postgres-data:
